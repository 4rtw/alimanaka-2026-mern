services:
  mongodb:
    image: mongo:7.0
    container_name: alimanaka-mongodb-new
    volumes:
      - mongodb_data_new:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: alimanaka-backend-new
    ports:
      - "8005:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/alimanaka
      - CORS_ORIGIN=https://alimanaka.chantilly-shaula.ts.net
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: alimanaka-frontend-new
    ports:
      - "8004:3000"
    environment:
      - API_URL=https://alimanaka.chantilly-shaula.ts.net:8443/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data_new:
